name: Publish docs to defiriskalliance.github.io

# Auto-publishes the contents of docs/ to the org Pages repo whenever
# anything inside docs/ changes on main. Replaces the manual
# `git subtree split --prefix=docs && git push dra dra-publish:main`
# workflow that used to be required to ship a new vault rating.
#
# How it works:
#   1. Checkout dra-core with full history (subtree-split needs it).
#   2. Run `git subtree split --prefix=docs HEAD` to produce a commit
#      that contains exactly docs/ flattened to the root.
#   3. Push that commit to DefiRiskAlliance/defiriskalliance.github.io
#      main via SSH, using a deploy key stored as the PAGES_DEPLOY_KEY
#      secret on this repo.
#
# One-time setup the maintainer must do (see README "Deployment"):
#   - Generate an SSH keypair (ed25519 recommended).
#   - Add the PUBLIC key as a Deploy Key on
#     DefiRiskAlliance/defiriskalliance.github.io with "Allow write
#     access" ticked.
#   - Add the PRIVATE key as the repository secret `PAGES_DEPLOY_KEY`
#     on this repo (dra-core).
#
# Deploy keys are per-repo and bypass org PAT policy entirely, which
# is why this works where a fine-grained PAT may not.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/publish-docs.yml'
  workflow_dispatch: {}

concurrency:
  group: publish-docs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dra-core
        uses: actions/checkout@v4
        with:
          # subtree-split walks history; shallow clones break it
          fetch-depth: 0

      - name: Configure git identity for the split commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Subtree-split docs/ to a flat commit
        id: split
        run: |
          SHA=$(git subtree split --prefix=docs HEAD)
          if [ -z "$SHA" ]; then
            echo "subtree split produced no commit; failing"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Split commit: $SHA"
          git log --oneline -1 "$SHA"

      - name: Install SSH deploy key
        env:
          PAGES_DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          if [ -z "$PAGES_DEPLOY_KEY" ]; then
            echo "::error::PAGES_DEPLOY_KEY secret is not configured."
            echo "See README 'Deployment' for the one-time setup."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Use printf, not echo, to preserve newlines exactly.
          printf '%s\n' "$PAGES_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com > ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Push to defiriskalliance.github.io main via SSH
        run: |
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            git push \
              git@github.com:DefiRiskAlliance/defiriskalliance.github.io.git \
              "${{ steps.split.outputs.sha }}:refs/heads/main"

      - name: Note about GitHub Pages build
        run: |
          echo "Pushed. GitHub Pages will rebuild defiriskalliance.github.io within ~30-60 seconds."
          echo "Watch the build at: https://github.com/DefiRiskAlliance/defiriskalliance.github.io/actions"
